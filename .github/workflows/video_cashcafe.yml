name: "Video: CashCafe (Long-Form)"
on:
  schedule:
    - cron: '0 4 * * *'    # 06:00 ES (LF amanecer)
    - cron: '0 17 * * *'   # 19:00 ES (LF prime time)
  workflow_dispatch:
jobs:
  video:
    permissions:
      contents: write
    uses: ./.github/workflows/longform_engine.yml
    with:
      channel: cash_cafe
    secrets: inherit
