name: "Video: FinanzasClara (Long-Form)"

on:
  schedule:
    # 3 videos/semana: Lunes, Miércoles, Viernes 14:00 España (12:00 UTC)
    - cron: '0 12 * * 1'
    - cron: '0 12 * * 3'
    - cron: '0 12 * * 5'
  workflow_dispatch:

jobs:
  video:
    uses: ./.github/workflows/longform_engine.yml
    with:
      channel: finanzas_clara_lf
    secrets: inherit
