name: "Video: HogarInteligente"
on:
  schedule:
    - cron: '0 14 * * *'   # 10:00 EST (mañana US)
    - cron: '0 18 * * *'   # 14:00 EST (sobremesa US)
    - cron: '0 0 * * *'    # 20:00 EST (prime time US)
  workflow_dispatch:
jobs:
  video:
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: hogarinteligente
    secrets: inherit
