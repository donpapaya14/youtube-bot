name: "Video: HogarInteligente"
on:
  schedule:
    - cron: '0 10 * * *'   # 06:00 EST
    - cron: '0 14 * * *'   # 10:00 EST
    - cron: '0 18 * * *'   # 14:00 EST
    - cron: '0 21 * * *'   # 17:00 EST
    - cron: '0 0 * * *'    # 20:00 EST
  workflow_dispatch:
jobs:
  video:
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: hogarinteligente
    secrets: inherit
