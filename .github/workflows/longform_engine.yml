name: "Long-Form Video Engine"

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: longform-${{ inputs.channel }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run long-form bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_TOKEN_CHILLORBIT: ${{ secrets.YT_TOKEN_CHILLORBIT }}
          YT_TOKEN_CALMEARTH: ${{ secrets.YT_TOKEN_CALMEARTH }}
          YT_TOKEN_DARKFILES: ${{ secrets.YT_TOKEN_DARKFILES }}
          YT_TOKEN_SALUD: ${{ secrets.YT_TOKEN_SALUD }}
          YT_TOKEN_CATBROTHERS: ${{ secrets.YT_TOKEN_CATBROTHERS }}
          YT_TOKEN_FINANZAS: ${{ secrets.YT_TOKEN_FINANZAS }}
          YT_TOKEN_CASHCAFE: ${{ secrets.YT_TOKEN_CASHCAFE }}
          YT_TOKEN_PRINCIPAL: ${{ secrets.YT_TOKEN_PRINCIPAL }}
          YT_TOKEN_HOGARINTELIGENTE: ${{ secrets.YT_TOKEN_HOGARINTELIGENTE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python src/main_longform.py --channel ${{ inputs.channel }}
