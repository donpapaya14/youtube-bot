name: YouTube Shorts Bot

on:
  schedule:
    # 8 canales — cada hora única para distinguir en case
    - cron: '0 7 * * *'    # CatBrothers 1
    - cron: '0 8 * * *'    # FinanzasClara
    - cron: '0 9 * * *'    # MenteLegal
    - cron: '0 10 * * *'   # IAExplica
    - cron: '0 11 * * *'   # SaludLongevidad
    - cron: '0 12 * * *'   # CatBrothers 2
    - cron: '0 13 * * *'   # VidaSana360
    - cron: '0 14 * * *'   # HogarInteligente 1
    - cron: '0 15 * * *'   # MentePróspera
    - cron: '0 16 * * *'   # HogarInteligente 2
    - cron: '0 17 * * *'   # CatBrothers 3
    - cron: '0 18 * * *'   # HogarInteligente 3
    - cron: '0 10 * * 0'  # Newsletter dominical
  workflow_dispatch:
    inputs:
      channel:
        description: 'Canal a ejecutar'
        required: true
        type: choice
        options:
          - finanzas_clara
          - mente_legal
          - ia_explica
          - salud_longevidad
          - mente_prospera
          - vida_sana_360
          - catbrothers
          - hogarinteligente
          - newsletter
          - all

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.channel }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "0 7 * * *")  echo "name=catbrothers" >> $GITHUB_OUTPUT ;;
              "0 8 * * *")  echo "name=finanzas_clara" >> $GITHUB_OUTPUT ;;
              "0 9 * * *")  echo "name=mente_legal" >> $GITHUB_OUTPUT ;;
              "0 10 * * *") echo "name=ia_explica" >> $GITHUB_OUTPUT ;;
              "0 11 * * *") echo "name=salud_longevidad" >> $GITHUB_OUTPUT ;;
              "0 12 * * *") echo "name=catbrothers" >> $GITHUB_OUTPUT ;;
              "0 13 * * *") echo "name=vida_sana_360" >> $GITHUB_OUTPUT ;;
              "0 14 * * *") echo "name=hogarinteligente" >> $GITHUB_OUTPUT ;;
              "0 15 * * *") echo "name=mente_prospera" >> $GITHUB_OUTPUT ;;
              "0 16 * * *") echo "name=hogarinteligente" >> $GITHUB_OUTPUT ;;
              "0 17 * * *") echo "name=catbrothers" >> $GITHUB_OUTPUT ;;
              "0 18 * * *") echo "name=hogarinteligente" >> $GITHUB_OUTPUT ;;
              "0 10 * * 0") echo "name=newsletter" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run newsletter
        if: steps.channel.outputs.name == 'newsletter'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/newsletter.py

      - name: Run bot
        if: steps.channel.outputs.name != 'all' && steps.channel.outputs.name != 'newsletter'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_TOKEN_FINANZAS: ${{ secrets.YT_TOKEN_FINANZAS }}
          YT_TOKEN_LEGAL: ${{ secrets.YT_TOKEN_LEGAL }}
          YT_TOKEN_IA: ${{ secrets.YT_TOKEN_IA }}
          YT_TOKEN_SALUD: ${{ secrets.YT_TOKEN_SALUD }}
          YT_TOKEN_PROSPERA: ${{ secrets.YT_TOKEN_PROSPERA }}
          YT_TOKEN_PRINCIPAL: ${{ secrets.YT_TOKEN_PRINCIPAL }}
          YT_TOKEN_CATBROTHERS: ${{ secrets.YT_TOKEN_CATBROTHERS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python src/main.py --channel ${{ steps.channel.outputs.name }}

      - name: Run all channels
        if: steps.channel.outputs.name == 'all'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_TOKEN_FINANZAS: ${{ secrets.YT_TOKEN_FINANZAS }}
          YT_TOKEN_LEGAL: ${{ secrets.YT_TOKEN_LEGAL }}
          YT_TOKEN_IA: ${{ secrets.YT_TOKEN_IA }}
          YT_TOKEN_SALUD: ${{ secrets.YT_TOKEN_SALUD }}
          YT_TOKEN_PROSPERA: ${{ secrets.YT_TOKEN_PROSPERA }}
          YT_TOKEN_PRINCIPAL: ${{ secrets.YT_TOKEN_PRINCIPAL }}
          YT_TOKEN_CATBROTHERS: ${{ secrets.YT_TOKEN_CATBROTHERS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          for channel in finanzas_clara mente_legal ia_explica salud_longevidad vida_sana_360 mente_prospera; do
            echo "=== Running $channel ==="
            python src/main.py --channel $channel || true
            sleep $((RANDOM % 120 + 60))
          done
