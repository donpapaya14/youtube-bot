name: YouTube Shorts Bot (Manual)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Canal a ejecutar'
        required: true
        type: choice
        options:
          - vida_sana_360
          - salud_longevidad
          - finanzas_clara
          - catbrothers
          - hogarinteligente
          - newsletter
          - all

jobs:
  single:
    if: ${{ inputs.channel != 'all' && inputs.channel != 'newsletter' }}
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: ${{ inputs.channel }}
    secrets: inherit

  newsletter:
    if: ${{ inputs.channel == 'newsletter' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Send newsletter
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          MAILCHIMP_LIST_ID: ${{ secrets.MAILCHIMP_LIST_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/newsletter.py

  all-channels:
    if: ${{ inputs.channel == 'all' }}
    strategy:
      max-parallel: 1
      matrix:
        channel: [vida_sana_360, salud_longevidad, finanzas_clara, catbrothers, hogarinteligente]
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: ${{ matrix.channel }}
    secrets: inherit
