name: YouTube Shorts Bot

on:
  schedule:
    # MAÑANA — 1 video por canal (5 uploads = 8,000 uds)
    - cron: '0 8 * * *'   # FinanzasClara
    - cron: '0 9 * * *'   # MenteLegal
    - cron: '0 10 * * *'  # IAExplica
    - cron: '0 11 * * *'  # SaludLongevidad
    - cron: '0 12 * * *'  # MentePróspera
    # TARDE — 1 video extra rotativo (total 6 = 9,600 uds)
    - cron: '30 16 * * *'  # Canal rotativo según día semana
  workflow_dispatch:
    inputs:
      channel:
        description: 'Canal a ejecutar'
        required: true
        type: choice
        options:
          - finanzas_clara
          - mente_legal
          - ia_explica
          - salud_longevidad
          - mente_prospera
          - all

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.channel }}" >> $GITHUB_OUTPUT
          else
            case "${{ github.event.schedule }}" in
              "0 8 * * *")  echo "name=finanzas_clara" >> $GITHUB_OUTPUT ;;
              "0 9 * * *")  echo "name=mente_legal" >> $GITHUB_OUTPUT ;;
              "0 10 * * *") echo "name=ia_explica" >> $GITHUB_OUTPUT ;;
              "0 11 * * *") echo "name=salud_longevidad" >> $GITHUB_OUTPUT ;;
              "0 12 * * *") echo "name=mente_prospera" >> $GITHUB_OUTPUT ;;
              "30 16 * * *")
                # Rotación: canal extra según día de la semana
                DOW=$(date +%u)  # 1=Lun, 2=Mar, 3=Mié, 4=Jue, 5=Vie, 6=Sáb, 7=Dom
                case $DOW in
                  1|6) echo "name=finanzas_clara" >> $GITHUB_OUTPUT ;;
                  2|7) echo "name=mente_legal" >> $GITHUB_OUTPUT ;;
                  3)   echo "name=ia_explica" >> $GITHUB_OUTPUT ;;
                  4)   echo "name=salud_longevidad" >> $GITHUB_OUTPUT ;;
                  5)   echo "name=mente_prospera" >> $GITHUB_OUTPUT ;;
                esac
                ;;
            esac
          fi

      - name: Run bot
        if: steps.channel.outputs.name != 'all'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_TOKEN_FINANZAS: ${{ secrets.YT_TOKEN_FINANZAS }}
          YT_TOKEN_LEGAL: ${{ secrets.YT_TOKEN_LEGAL }}
          YT_TOKEN_IA: ${{ secrets.YT_TOKEN_IA }}
          YT_TOKEN_SALUD: ${{ secrets.YT_TOKEN_SALUD }}
          YT_TOKEN_PROSPERA: ${{ secrets.YT_TOKEN_PROSPERA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python src/main.py --channel ${{ steps.channel.outputs.name }}

      - name: Run all channels
        if: steps.channel.outputs.name == 'all'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_TOKEN_FINANZAS: ${{ secrets.YT_TOKEN_FINANZAS }}
          YT_TOKEN_LEGAL: ${{ secrets.YT_TOKEN_LEGAL }}
          YT_TOKEN_IA: ${{ secrets.YT_TOKEN_IA }}
          YT_TOKEN_SALUD: ${{ secrets.YT_TOKEN_SALUD }}
          YT_TOKEN_PROSPERA: ${{ secrets.YT_TOKEN_PROSPERA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: |
          for channel in finanzas_clara mente_legal ia_explica salud_longevidad mente_prospera; do
            echo "=== Running $channel ==="
            python src/main.py --channel $channel || true
            sleep $((RANDOM % 120 + 60))
          done
