name: YouTube Shorts Bot (Manual)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Canal a ejecutar'
        required: true
        type: choice
        options:
          - vida_sana_360
          - salud_longevidad
          - finanzas_clara
          - catbrothers
          - hogarinteligente
          - all

jobs:
  single:
    if: ${{ inputs.channel != 'all' }}
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: ${{ inputs.channel }}
    secrets: inherit

  all-channels:
    if: ${{ inputs.channel == 'all' }}
    strategy:
      max-parallel: 1
      matrix:
        channel: [vida_sana_360, salud_longevidad, finanzas_clara, catbrothers, hogarinteligente]
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: ${{ matrix.channel }}
    secrets: inherit
