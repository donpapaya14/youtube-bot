name: "Video: SaludLongevidad"
on:
  schedule:
    - cron: '30 6 * * *'   # 08:30 España (mañana)
    - cron: '30 12 * * *'  # 14:30 España (almuerzo)
    - cron: '30 19 * * *'  # 21:30 España (prime time)
  workflow_dispatch:
jobs:
  video:
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: salud_longevidad
    secrets: inherit
