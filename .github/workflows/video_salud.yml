name: "Video: SaludLongevidad"
on:
  # REACTIVADO 2026-05-30: vertical salud ES funciona (62 subs en ~5 semanas, mejor velocidad). Concentrar aqui.
  schedule:
    - cron: '30 6 * * *'  # 06:30 UTC diario (shorts = motor de discovery)
  workflow_dispatch:
jobs:
  video:
    permissions:
      contents: write
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: salud_longevidad
    secrets: inherit
