name: "Video: FinanzasClara"
on:
  schedule:
    - cron: '0 9 * * *'    # 05:00 EST
    - cron: '0 13 * * *'   # 09:00 EST
    - cron: '0 17 * * *'   # 13:00 EST
    - cron: '0 20 * * *'   # 16:00 EST
    - cron: '0 23 * * *'   # 19:00 EST
  workflow_dispatch:
jobs:
  video:
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: finanzas_clara
    secrets: inherit
