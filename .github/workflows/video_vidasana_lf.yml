name: "Video: VidaSana360 (Long-Form)"
on:
  # REACTIVADO 2026-05-30: largos VidaSana de vuelta a diario por decisión del usuario.
  schedule:
    - cron: '0 18 * * *'  # 18:00 UTC (20:00 ES) diario
  workflow_dispatch:
jobs:
  video:
    permissions:
      contents: write
    uses: ./.github/workflows/longform_engine.yml
    with:
      channel: vida_sana_360_lf
    secrets: inherit
