name: "Video: Catch-up"

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check and dispatch missing videos
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          TODAY=$(date -u +%Y-%m-%d)
          HOUR=$(date -u +%H)
          TOTAL_MISSING=0
          REPORT=""

          # By 13:00: each channel should have ~2 videos
          # By 22:00: each channel should have 5 videos
          if [ "$HOUR" -lt 15 ]; then
            VIDA_EXP=2; SALUD_EXP=2; FINANZAS_EXP=2; CAT_EXP=2; HOGAR_EXP=2
          else
            VIDA_EXP=5; SALUD_EXP=5; FINANZAS_EXP=5; CAT_EXP=5; HOGAR_EXP=5
          fi

          count_success() {
            gh run list --repo "$REPO" --workflow "$1" --limit 20 --json conclusion,createdAt \
              --jq "[.[] | select(.createdAt >= \"${TODAY}T00:00:00Z\" and .conclusion == \"success\")] | length" 2>/dev/null || echo 0
          }

          check_and_dispatch() {
            local WF="$1" LABEL="$2" EXPECTED="$3"
            local GOT=$(count_success "$WF")
            local NEED=$((EXPECTED - GOT))
            if [ "$NEED" -gt 0 ]; then
              REPORT="${REPORT}⚠ ${LABEL}: ${GOT}/${EXPECTED}\n"
              TOTAL_MISSING=$((TOTAL_MISSING + NEED))
              for i in $(seq 1 $NEED); do
                echo "Dispatching $LABEL ($i/$NEED)..."
                gh workflow run "$WF" --repo "$REPO" || true
                sleep 60
              done
            else
              REPORT="${REPORT}✓ ${LABEL}: ${GOT}/${EXPECTED}\n"
            fi
          }

          check_and_dispatch video_vidasana.yml VidaSana360 $VIDA_EXP
          check_and_dispatch video_salud.yml SaludLongevidad $SALUD_EXP
          check_and_dispatch video_finanzas.yml FinanzasClara $FINANZAS_EXP
          check_and_dispatch video_catbrothers.yml CatBrothers $CAT_EXP
          check_and_dispatch video_hogar.yml HogarInteligente $HOGAR_EXP

          TOTAL_EXP=$((VIDA_EXP + SALUD_EXP + FINANZAS_EXP + CAT_EXP + HOGAR_EXP))
          echo -e "$REPORT"
          echo "total_missing=$TOTAL_MISSING" >> $GITHUB_OUTPUT
          echo "total_exp=$TOTAL_EXP" >> $GITHUB_OUTPUT

      - name: Telegram resumen
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MISSING="${{ steps.check.outputs.total_missing }}"
          TOTAL="${{ steps.check.outputs.total_exp }}"
          HOUR=$(date -u +%H)
          OK=$((TOTAL - MISSING))
          if [ "${MISSING:-0}" = "0" ]; then
            MSG="✅ <b>Video Catch-up ${HOUR}:00</b> — ${OK}/${TOTAL} videos OK"
          else
            MSG="🔄 <b>Video Catch-up ${HOUR}:00</b> — ${MISSING} videos faltaban, relanzados"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="$MSG" || true
