name: "Video: MindWired"

on:
  schedule:
    # 5 videos/semana: Lun-Vie 18:00 España (16:00 UTC)
    - cron: '0 16 * * 1'
    - cron: '0 16 * * 2'
    - cron: '0 16 * * 3'
    - cron: '0 16 * * 4'
    - cron: '0 16 * * 5'
  workflow_dispatch:

jobs:
  video:
    uses: ./.github/workflows/longform_engine.yml
    with:
      channel: chill_orbit
    secrets: inherit
