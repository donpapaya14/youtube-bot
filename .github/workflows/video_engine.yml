name: Video Engine

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string

concurrency:
  group: youtube-video-${{ inputs.channel }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_TOKEN_FINANZAS: ${{ secrets.YT_TOKEN_FINANZAS }}
          YT_TOKEN_SALUD: ${{ secrets.YT_TOKEN_SALUD }}
          YT_TOKEN_PRINCIPAL: ${{ secrets.YT_TOKEN_PRINCIPAL }}
          YT_TOKEN_CATBROTHERS: ${{ secrets.YT_TOKEN_CATBROTHERS }}
          YT_TOKEN_HOGARINTELIGENTE: ${{ secrets.YT_TOKEN_HOGARINTELIGENTE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python src/main.py --channel ${{ inputs.channel }}

      - name: Persist title cache + topics used
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p .title_cache
          git add -f .title_cache/ topics/*.used 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(cache): persist dedup state for ${{ inputs.channel }}" || true
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push origin HEAD:main && break
              sleep $((RANDOM % 10 + 5))
            done
          fi
