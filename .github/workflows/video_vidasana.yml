name: "Video: VidaSana360"
on:
  schedule:
    - cron: '0 6 * * *'    # 08:00 España (mañana)
    - cron: '0 12 * * *'   # 14:00 España (almuerzo)
    - cron: '0 19 * * *'   # 21:00 España (prime time)
  workflow_dispatch:
jobs:
  video:
    permissions:
      contents: write
    uses: ./.github/workflows/video_engine.yml
    with:
      channel: vida_sana_360
    secrets: inherit
