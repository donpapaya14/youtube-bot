name: "Video: DisasterDecode"

on:
  schedule:
    # 5 videos/semana: Lun-Vie 16:00 España (14:00 UTC)
    - cron: '0 14 * * 1'
    - cron: '0 14 * * 2'
    - cron: '0 14 * * 3'
    - cron: '0 14 * * 4'
    - cron: '0 14 * * 5'
  workflow_dispatch:

jobs:
  video:
    uses: ./.github/workflows/longform_engine.yml
    with:
      channel: calm_earth
    secrets: inherit
